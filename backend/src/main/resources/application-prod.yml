# ── application-prod.yml (운영 환경 설정) ─────────────────────
# 이 파일은 docker-compose의 SPRING_PROFILES_ACTIVE=prod 로 활성화됩니다.
# 민감한 값은 환경변수에서 읽어옵니다. (${변수명} 형식)

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        show_sql: false        # 운영에서는 SQL 로그 끔
        format_sql: false
    open-in-view: false

  sql:
    init:
      mode: always             # 초기 데이터 로딩

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

server:
  port: 8080

logging:
  level:
    com.workout: INFO
    org.hibernate.SQL: WARN
