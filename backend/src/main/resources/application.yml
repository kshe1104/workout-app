spring:
  datasource:
    # MySQL 접속 정보
    # useSSL=false: 로컬 개발 환경에서 SSL 비활성화
    # serverTimezone=Asia/Seoul: 한국 시간대 설정
    # characterEncoding=UTF-8: 한글 깨짐 방지
    url: jdbc:mysql://localhost:3306/workout_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: "0000"
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      # ddl-auto 옵션 설명:
      # create      - 앱 시작 시 테이블 새로 생성 (기존 데이터 삭제됨)
      # create-drop - 앱 종료 시 테이블 삭제
      # update      - Entity 변경사항만 반영 (기존 데이터 유지) ← 개발 초기 권장
      # validate    - 테이블 구조만 검증, 변경 안 함 ← 운영 환경 권장
      # none        - 아무것도 하지 않음
      ddl-auto: update
    properties:
      hibernate:
        # SQL 쿼리를 콘솔에 출력 (개발 중 N+1 문제 탐지에 유용)
        show_sql: true
        # 출력되는 SQL을 보기 좋게 포맷팅
        format_sql: true
        # 실제 실행되는 SQL의 파라미터 값도 출력
        use_sql_comments: true
        # DB 방언 설정: MySQL8 문법 사용
        dialect: org.hibernate.dialect.MySQL8Dialect
    # 지연 로딩 시 영속성 컨텍스트 관련 설정
    open-in-view: false
    # open-in-view: false 설명 - 트랜잭션 범위 밖에서 DB 접근을 막아
    # LazyInitializationException을 명시적으로 발생시킴
    # 성능 문제를 숨기지 않고 드러내기 위해 false 권장

# JWT 설정
jwt:
  # secret: JWT 서명에 사용하는 비밀키
  # 실제 운영에서는 이 값을 환경변수로 관리해야 함 (절대 코드에 하드코딩 금지)
  secret: workoutAppSecretKeyForJwtTokenGenerationMustBeLongEnough256bits
  # Access Token 만료 시간: 15분 (밀리초)
  access-token-expiration: 900000
  # Refresh Token 만료 시간: 7일 (밀리초)
  refresh-token-expiration: 604800000

# 서버 포트 (React는 3000, Spring은 8080 - CORS 때문에 포트 구분)
server:
  port: 8080

# 로깅 설정
logging:
  level:
    # SQL 실행 로그 상세 출력 (개발 시 유용)
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.workout: DEBUG
