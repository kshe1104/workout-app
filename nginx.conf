server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA 라우팅 ────────────────────────────────────────
    # React Router는 클라이언트 사이드 라우팅을 사용합니다.
    # /dashboard 같은 URL을 새로고침하면 Nginx가 해당 파일을 찾으려 하다가 404를 냅니다.
    # → 모든 요청을 index.html로 보내서 React Router가 처리하게 합니다.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API 프록시 ────────────────────────────────────────────
    # /api/** 요청을 백엔드 컨테이너로 전달
    # 프론트(80포트)와 백엔드(8080포트)가 같은 도메인에 있는 것처럼 동작
    # → 브라우저의 CORS 정책 우회 + SecurityConfig CORS 설정 단순화
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 프록시 타임아웃 설정
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── 정적 파일 캐싱 ────────────────────────────────────────
    # JS/CSS/이미지 파일은 브라우저에 오래 캐싱 → 재방문 시 빠른 로딩
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 에러 페이지
    error_page 404 /index.html;
}
